version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=zenny
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - N8N_HOST=${N8N_HOST:?Set N8N_HOST in .env}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${N8N_HOST}:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - zenny

  langfuse:
    image: langfuse/langfuse:latest
    restart: always
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${LANGFUSE_DATABASE_URL:?Set LANGFUSE_DATABASE_URL in .env}
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET:?Set LANGFUSE_SECRET in .env}
      - SALT=${LANGFUSE_SALT:?Set LANGFUSE_SALT in .env}
      - NEXTAUTH_URL=http://${N8N_HOST}:3001
    volumes:
      - langfuse_data:/data
    networks:
      - zenny

volumes:
  n8n_data:
  langfuse_data:

networks:
  zenny:
    driver: bridge
